name: Codex Activity History Apply

on:
  push:
    branches:
      - main
    paths:
      - codex-trigger-activity-history.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply activity history files
        run: |
          cat .codex/activity-history/app.*.b64 | base64 -d > src/App.jsx
          cat .codex/activity-history/sql.*.b64 | base64 -d > supabase-activity-history.sql
          rm -rf .codex/activity-history
          rm -f .github/workflows/codex-activity-history.yml codex-trigger-activity-history.txt
      - name: Build check
        run: |
          npm install
          npm run build
      - name: Commit final files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add ATS activity history tracking" || exit 0
          git push
